<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>CycleNav</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root {
    --ink: #14171a;
    --paper: #f6f5f2;
    --accent: #ff5a1f;
    --ok: #1ab35e;
    --muted: #8a8f94;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  #map { position: absolute; inset: 0; z-index: 1; }

  /* ---- Edit mode top controls ---- */
  #editBar {
    position: absolute;
    top: max(14px, env(safe-area-inset-top));
    left: 50%;
    transform: translateX(-50%);
    z-index: 500;
    display: flex;
    gap: 6px;
    background: rgba(20,23,26,0.92);
    padding: 5px;
    border-radius: 999px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
  }
  .seg {
    border: none;
    background: transparent;
    color: #cfd3d6;
    font-size: 14px;
    font-weight: 600;
    padding: 10px 16px;
    border-radius: 999px;
    transition: background 0.15s, color 0.15s;
  }
  .seg.active { background: var(--accent); color: white; }
  .seg.clearBtn { color: #ff8f6b; }

  /* ---- Bottom action button ---- */
  #rideBtn {
    position: absolute;
    left: 50%;
    bottom: max(22px, env(safe-area-inset-bottom));
    transform: translateX(-50%);
    z-index: 500;
    border: none;
    background: var(--ink);
    color: white;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.2px;
    padding: 16px 40px;
    border-radius: 999px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }
  #rideBtn:disabled { background: #b9bcbf; }
  #rideBtn.locked { background: var(--ok); }

  #unlockBtn {
    position: absolute;
    top: max(14px, env(safe-area-inset-top));
    right: 14px;
    z-index: 500;
    border: none;
    background: rgba(20,23,26,0.85);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    padding: 9px 14px;
    border-radius: 999px;
  }

  /* ---- Nav overlay (riding): small compass + distance ---- */
  #navPanel {
    position: absolute;
    top: max(14px, env(safe-area-inset-top));
    left: 14px;
    z-index: 500;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    background: rgba(20,23,26,0.9);
    border-radius: 16px;
    padding: 8px 10px 10px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }
  #compassWrap {
    position: relative;
    width: 54px;
    height: 54px;
  }
  #compassWrap svg { width: 100%; height: 100%; }
  #compassNeedle {
    position: absolute;
    inset: 0;
    transform-origin: 50% 50%;
    transition: transform 0.08s linear;
  }
  #navDist {
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    text-align: center;
    line-height: 1.3;
  }
  #navDist .dim { color: var(--muted); font-weight: 500; font-size: 10px; display: block; }

  /* ---- Floating edge indicator (star) ---- */
  #edgeStar {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 480;
    font-size: 30px;
    line-height: 1;
    transform: translate(-100px, -100px);
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
    display: none;
    pointer-events: none;
  }

  /* ---- Recenter button ---- */
  #recenterBtn {
    position: absolute;
    right: 14px;
    bottom: max(110px, calc(env(safe-area-inset-bottom) + 100px));
    z-index: 500;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    border: none;
    background: rgba(20,23,26,0.9);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 14px rgba(0,0,0,0.3);
  }
  #recenterBtn svg { width: 22px; height: 22px; }

  /* ---- Pulse highlight for the currently-targeted marker ---- */
  .pulse-target {
    animation: pulseRing 1.1s ease-out infinite;
    border-radius: 50%;
  }
  @keyframes pulseRing {
    0%   { box-shadow: 0 0 0 0 rgba(255,90,31,0.55); }
    70%  { box-shadow: 0 0 0 16px rgba(255,90,31,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,90,31,0); }
  }

  #finishToast {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 600;
    background: var(--ok);
    color: white;
    font-weight: 700;
    font-size: 18px;
    padding: 16px 26px;
    border-radius: 16px;
    display: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }

  #permOverlay {
    position: absolute;
    inset: 0;
    z-index: 900;
    background: rgba(20,23,26,0.96);
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 30px;
    gap: 16px;
  }
  #permOverlay button {
    background: var(--accent);
    color: white;
    border: none;
    font-size: 16px;
    font-weight: 700;
    padding: 14px 30px;
    border-radius: 999px;
  }
  #permOverlay p { max-width: 300px; color: #cfd3d6; font-size: 14px; line-height: 1.5; }

  .leaflet-control-attribution { font-size: 9px !important; }
</style>
</head>
<body>

<div id="map"></div>

<div id="editBar">
  <button class="seg active" id="modeWaypoint" onclick="setEditMode('waypoint')">+ Waypoint</button>
  <button class="seg" id="modeEndpoint" onclick="setEditMode('endpoint')">+ Endpoint</button>
  <button class="seg clearBtn" onclick="clearAll()">Clear</button>
</div>

<button id="rideBtn" onclick="toggleRide()" disabled>Ride</button>
<button id="unlockBtn" style="display:none" onclick="toggleRide()">Unlock</button>

<button id="recenterBtn" onclick="recenterMap()" aria-label="Center on my location">
  <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="3" fill="white" stroke="none"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4" stroke-linecap="round"/></svg>
</button>

<div id="navPanel">
  <div id="compassWrap">
    <svg viewBox="0 0 54 54">
      <circle cx="27" cy="27" r="25" fill="none" stroke="#3a3f44" stroke-width="2"/>
      <text x="27" y="10" fill="#8a8f94" font-size="7" text-anchor="middle" font-weight="700">N</text>
    </svg>
    <div id="compassNeedle">
      <svg viewBox="0 0 54 54">
        <path d="M27 8 L32 27 L27 23 L22 27 Z" fill="#ff5a1f"/>
        <path d="M27 46 L32 27 L27 31 L22 27 Z" fill="#5a5f64"/>
      </svg>
    </div>
  </div>
  <div id="navDist">
    <span id="navDistVal">--</span>
    <span class="dim" id="navNext">to next point</span>
  </div>
</div>

<div id="edgeStar">⭐</div>

<div id="finishToast">🏁 Route complete</div>

<div id="permOverlay">
  <p style="font-size:20px;font-weight:700;color:white;margin:0;">CycleNav needs two permissions</p>
  <p>Location, to show you on the map, and motion/compass, so the direction arrow knows which way you're facing.</p>
  <button onclick="requestPermissions()">Allow &amp; start</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ---------- State ----------
let map, meMarker, meAccuracyCircle;
let waypoints = [];      // ordered list of {lat,lng,marker,idx}
let endpoint = null;     // {lat,lng,marker}
let editMode = 'waypoint';
let locked = false;
let routeSeq = [];       // frozen sequence when locked: [...waypoints, endpoint]
let visitedCount = 0;

let currentPos = null;   // {lat,lng}
let heading = null;      // degrees, 0 = facing north
let watchId = null;

const ARRIVAL_METERS = 25;

// ---------- Map setup ----------
function initMap() {
  map = L.map('map', {
    zoomControl: false,
    attributionControl: true,
    dragging: true,
    touchZoom: true,
    tap: true,
    inertia: true
  }).setView([52.09, 5.12], 14);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  map.on('click', onMapClick);
  // Re-check whether the next waypoint is visible whenever the user pans/zooms,
  // so the edge star / pulse highlight stay correct even if they're not moving.
  map.on('moveend zoomend', () => { if (locked) updateNav(); });
}

function recenterMap() {
  if (!currentPos) return;
  map.flyTo([currentPos.lat, currentPos.lng], Math.max(map.getZoom(), 16), { duration: 0.5 });
}

function onMapClick(e) {
  if (locked) return;
  if (editMode === 'waypoint') {
    addWaypoint(e.latlng);
  } else {
    setEndpoint(e.latlng);
  }
  updateRideButton();
}

function waypointIcon(n) {
  return L.divIcon({
    className: '',
    html: `<div style="background:#14171a;color:white;font-weight:700;font-size:13px;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3)">${n}</div>`,
    iconSize: [26,26],
    iconAnchor: [13,13]
  });
}

const endpointIcon = L.divIcon({
  className: '',
  html: `<div style="font-size:26px;line-height:1;">🏁</div>`,
  iconSize: [26,26],
  iconAnchor: [13,24]
});

function addWaypoint(latlng) {
  const marker = L.marker(latlng, { icon: waypointIcon(waypoints.length + 1), draggable: !locked }).addTo(map);
  const wp = { lat: latlng.lat, lng: latlng.lng, marker };
  waypoints.push(wp);
  marker.on('dragend', () => {
    wp.lat = marker.getLatLng().lat;
    wp.lng = marker.getLatLng().lng;
  });
}

function setEndpoint(latlng) {
  if (endpoint) map.removeLayer(endpoint.marker);
  const marker = L.marker(latlng, { icon: endpointIcon, draggable: !locked }).addTo(map);
  endpoint = { lat: latlng.lat, lng: latlng.lng, marker };
  marker.on('dragend', () => {
    endpoint.lat = marker.getLatLng().lat;
    endpoint.lng = marker.getLatLng().lng;
  });
}

function clearAll() {
  if (locked) return;
  waypoints.forEach(w => map.removeLayer(w.marker));
  waypoints = [];
  if (endpoint) { map.removeLayer(endpoint.marker); endpoint = null; }
  updateRideButton();
}

function setEditMode(mode) {
  editMode = mode;
  document.getElementById('modeWaypoint').classList.toggle('active', mode === 'waypoint');
  document.getElementById('modeEndpoint').classList.toggle('active', mode === 'endpoint');
}

function updateRideButton() {
  const btn = document.getElementById('rideBtn');
  btn.disabled = !endpoint;
}

// ---------- Ride lock/unlock ----------
function toggleRide() {
  locked = !locked;
  const rideBtn = document.getElementById('rideBtn');
  const unlockBtn = document.getElementById('unlockBtn');
  const editBar = document.getElementById('editBar');
  const navPanel = document.getElementById('navPanel');

  if (locked) {
    routeSeq = [...waypoints, endpoint].filter(Boolean);
    visitedCount = 0;
    [...waypoints, endpoint].forEach(p => p && p.marker.dragging && p.marker.dragging.disable());
    editBar.style.display = 'none';
    rideBtn.style.display = 'none';
    unlockBtn.style.display = 'block';
    navPanel.style.display = 'flex';
    document.getElementById('finishToast').style.display = 'none';
  } else {
    [...waypoints, endpoint].forEach(p => p && p.marker.dragging && p.marker.dragging.enable());
    editBar.style.display = 'flex';
    rideBtn.style.display = 'block';
    unlockBtn.style.display = 'none';
    navPanel.style.display = 'none';
    document.getElementById('edgeStar').style.display = 'none';
    clearPulse();
  }
}

// ---------- Geo math ----------
function toRad(d) { return d * Math.PI / 180; }
function toDeg(r) { return r * 180 / Math.PI; }

function haversineMeters(a, b) {
  const R = 6371000;
  const dLat = toRad(b.lat - a.lat);
  const dLng = toRad(b.lng - a.lng);
  const lat1 = toRad(a.lat), lat2 = toRad(b.lat);
  const h = Math.sin(dLat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLng/2)**2;
  return 2 * R * Math.asin(Math.sqrt(h));
}

function bearingDeg(a, b) {
  const lat1 = toRad(a.lat), lat2 = toRad(b.lat);
  const dLng = toRad(b.lng - a.lng);
  const y = Math.sin(dLng) * Math.cos(lat2);
  const x = Math.cos(lat1)*Math.sin(lat2) - Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLng);
  return (toDeg(Math.atan2(y, x)) + 360) % 360;
}

// ---------- Live position ----------
function onPosition(pos) {
  currentPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };

  if (!meMarker) {
    meMarker = L.circleMarker([currentPos.lat, currentPos.lng], {
      radius: 8, color: '#fff', weight: 3, fillColor: '#2b7de9', fillOpacity: 1
    }).addTo(map);
    meAccuracyCircle = L.circle([currentPos.lat, currentPos.lng], { radius: pos.coords.accuracy, color: '#2b7de9', weight: 1, fillOpacity: 0.08 }).addTo(map);
    map.setView([currentPos.lat, currentPos.lng], 16);
  } else {
    meMarker.setLatLng([currentPos.lat, currentPos.lng]);
    meAccuracyCircle.setLatLng([currentPos.lat, currentPos.lng]);
    meAccuracyCircle.setRadius(pos.coords.accuracy);
  }

  if (locked) updateNav();
}

function onOrientation(e) {
  // Android absolute compass: alpha is rotation around z, 0 = facing north-ish
  // when device held flat. Convert to a 0-360 "which way am I facing" heading.
  if (typeof e.alpha !== 'number') return;
  heading = (360 - e.alpha) % 360;
  if (locked) updateNav();
}

let pulsedEl = null; // currently pulsing marker DOM element, so we can un-pulse it later

function setPulse(marker) {
  const el = marker ? marker.getElement && marker.getElement() : null;
  if (pulsedEl && pulsedEl !== el) pulsedEl.classList.remove('pulse-target');
  if (el) el.classList.add('pulse-target');
  pulsedEl = el || null;
}

function clearPulse() {
  if (pulsedEl) pulsedEl.classList.remove('pulse-target');
  pulsedEl = null;
}

function updateNav() {
  // Compass needle always turns to show heading, independent of route state.
  if (heading !== null) {
    document.getElementById('compassNeedle').style.transform = `rotate(${(360 - heading) % 360}deg)`;
  }

  if (!currentPos) return;

  // advance through route as points are reached
  while (visitedCount < routeSeq.length && haversineMeters(currentPos, routeSeq[visitedCount]) < ARRIVAL_METERS) {
    visitedCount++;
  }

  const edgeStar = document.getElementById('edgeStar');

  if (visitedCount >= routeSeq.length) {
    document.getElementById('finishToast').style.display = 'block';
    document.getElementById('navDistVal').textContent = '--';
    document.getElementById('navNext').textContent = 'route complete';
    edgeStar.style.display = 'none';
    clearPulse();
    return;
  }

  const next1 = routeSeq[visitedCount];
  const d1 = haversineMeters(currentPos, next1);
  document.getElementById('navDistVal').textContent = d1 < 1000 ? `${Math.round(d1)} m` : `${(d1/1000).toFixed(1)} km`;
  document.getElementById('navNext').textContent = (visitedCount === routeSeq.length - 1) ? 'to finish' : `to waypoint ${visitedCount + 1}`;

  // Is the next target currently visible inside the map viewport?
  const inView = map.getBounds().contains([next1.lat, next1.lng]);

  if (inView) {
    // It's on screen already - hide the edge star, highlight the real marker instead.
    edgeStar.style.display = 'none';
    setPulse(next1.marker);
    return;
  }

  clearPulse();

  if (heading === null) return; // can't place the star without a heading yet

  // Off-screen: float the star at the screen edge, in the phone-heading-relative direction.
  const bearing = bearingDeg(currentPos, next1);
  const rel = (bearing - heading + 360) % 360; // 0 = straight ahead of where you're facing

  const w = window.innerWidth, h = window.innerHeight;
  const cx = w / 2, cy = h / 2;
  const margin = 34; // keeps the star fully on-screen, clear of notches/edges
  const rad = toRad(rel);
  const dx = Math.sin(rad), dy = -Math.cos(rad); // 0deg = up

  let t = Infinity;
  if (dx !== 0) t = Math.min(t, (w / 2 - margin) / Math.abs(dx));
  if (dy !== 0) t = Math.min(t, (h / 2 - margin) / Math.abs(dy));

  const x = cx + dx * t;
  const y = cy + dy * t;

  edgeStar.style.transform = `translate(${x - 15}px, ${y - 15}px)`;
  edgeStar.style.display = 'block';
}

// ---------- Permissions ----------
function requestPermissions() {
  const finish = () => {
    document.getElementById('permOverlay').style.display = 'none';
    startWatching();
  };

  // Android Chrome: DeviceOrientationEvent.requestPermission is not typically needed,
  // but we still request geolocation explicitly and attach the orientation listener.
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission().then(state => {
      if (state === 'granted') attachOrientation();
      finish();
    }).catch(finish);
  } else {
    attachOrientation();
    finish();
  }
}

function attachOrientation() {
  if ('ondeviceorientationabsolute' in window) {
    window.addEventListener('deviceorientationabsolute', onOrientation, true);
  } else {
    window.addEventListener('deviceorientation', onOrientation, true);
  }
}

function startWatching() {
  if (!navigator.geolocation) {
    alert('Geolocation not available in this browser.');
    return;
  }
  watchId = navigator.geolocation.watchPosition(onPosition, err => console.warn('geo error', err), {
    enableHighAccuracy: true,
    maximumAge: 1000,
    timeout: 10000
  });
}

// ---------- Boot ----------
initMap();
</script>
</body>
</html>
