<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>CycleNav</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root {
    --ink: #14171a;
    --paper: #f6f5f2;
    --accent: #ff5a1f;
    --ok: #1ab35e;
    --muted: #8a8f94;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  #map { position: absolute; inset: 0; z-index: 1; }

  /* ---- Edit mode top controls ---- */
  #editBar {
    position: absolute;
    top: max(14px, env(safe-area-inset-top));
    left: 50%;
    transform: translateX(-50%);
    z-index: 500;
    display: flex;
    gap: 6px;
    background: rgba(20,23,26,0.92);
    padding: 5px;
    border-radius: 999px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
  }
  .seg {
    border: none;
    background: transparent;
    color: #cfd3d6;
    font-size: 14px;
    font-weight: 600;
    padding: 10px 16px;
    border-radius: 999px;
    transition: background 0.15s, color 0.15s;
  }
  .seg.active { background: var(--accent); color: white; }
  .seg.clearBtn { color: #ff8f6b; }

  /* ---- Bottom action button ---- */
  #rideBtn {
    position: absolute;
    left: 50%;
    bottom: max(22px, env(safe-area-inset-bottom));
    transform: translateX(-50%);
    z-index: 500;
    border: none;
    background: var(--ink);
    color: white;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.2px;
    padding: 16px 40px;
    border-radius: 999px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }
  #rideBtn:disabled { background: #b9bcbf; }
  #rideBtn.locked { background: var(--ok); }

  #unlockBtn {
    position: absolute;
    top: max(14px, env(safe-area-inset-top));
    right: 14px;
    z-index: 500;
    border: none;
    background: rgba(20,23,26,0.85);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    padding: 9px 14px;
    border-radius: 999px;
  }

  /* ---- Nav overlay (riding) ---- */
  #navPanel {
    position: absolute;
    top: max(14px, env(safe-area-inset-top));
    left: 50%;
    transform: translateX(-50%);
    z-index: 500;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  #arrowWrap {
    position: relative;
    width: 150px;
    height: 150px;
    background: rgba(20,23,26,0.9);
    border-radius: 50%;
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #arrowPrimary, #arrowSecondary {
    position: absolute;
    transform-origin: 50% 50%;
    transition: transform 0.08s linear;
  }
  #arrowPrimary svg { width: 92px; height: 92px; }
  #arrowSecondary { opacity: 0.4; }
  #arrowSecondary svg { width: 48px; height: 48px; }
  #navMeta {
    margin-top: 10px;
    background: rgba(20,23,26,0.9);
    color: #fff;
    padding: 8px 18px;
    border-radius: 14px;
    font-size: 14px;
    font-weight: 600;
    text-align: center;
    line-height: 1.4;
  }
  #navMeta .dim { color: var(--muted); font-weight: 500; font-size: 12px; }

  #finishToast {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 600;
    background: var(--ok);
    color: white;
    font-weight: 700;
    font-size: 18px;
    padding: 16px 26px;
    border-radius: 16px;
    display: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }

  #permOverlay {
    position: absolute;
    inset: 0;
    z-index: 900;
    background: rgba(20,23,26,0.96);
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 30px;
    gap: 16px;
  }
  #permOverlay button {
    background: var(--accent);
    color: white;
    border: none;
    font-size: 16px;
    font-weight: 700;
    padding: 14px 30px;
    border-radius: 999px;
  }
  #permOverlay p { max-width: 300px; color: #cfd3d6; font-size: 14px; line-height: 1.5; }

  .leaflet-control-attribution { font-size: 9px !important; }
</style>
</head>
<body>

<div id="map"></div>

<div id="editBar">
  <button class="seg active" id="modeWaypoint" onclick="setEditMode('waypoint')">+ Waypoint</button>
  <button class="seg" id="modeEndpoint" onclick="setEditMode('endpoint')">+ Endpoint</button>
  <button class="seg clearBtn" onclick="clearAll()">Clear</button>
</div>

<button id="rideBtn" onclick="toggleRide()" disabled>Ride</button>
<button id="unlockBtn" style="display:none" onclick="toggleRide()">Unlock</button>

<div id="navPanel">
  <div id="arrowWrap">
    <div id="arrowSecondary">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 3L19 21L12 17L5 21L12 3Z" fill="white"/></svg>
    </div>
    <div id="arrowPrimary">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 2L20 21L12 16L4 21L12 2Z" fill="#ff5a1f"/></svg>
    </div>
  </div>
  <div id="navMeta">
    <div id="navDist">--</div>
    <div class="dim" id="navNext">to next point</div>
  </div>
</div>

<div id="finishToast">🏁 Route complete</div>

<div id="permOverlay">
  <p style="font-size:20px;font-weight:700;color:white;margin:0;">CycleNav needs two permissions</p>
  <p>Location, to show you on the map, and motion/compass, so the direction arrow knows which way you're facing.</p>
  <button onclick="requestPermissions()">Allow &amp; start</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ---------- State ----------
let map, meMarker, meAccuracyCircle;
let waypoints = [];      // ordered list of {lat,lng,marker,idx}
let endpoint = null;     // {lat,lng,marker}
let editMode = 'waypoint';
let locked = false;
let routeSeq = [];       // frozen sequence when locked: [...waypoints, endpoint]
let visitedCount = 0;

let currentPos = null;   // {lat,lng}
let heading = null;      // degrees, 0 = facing north
let watchId = null;

const ARRIVAL_METERS = 25;

// ---------- Map setup ----------
function initMap() {
  map = L.map('map', { zoomControl: false, attributionControl: true }).setView([52.09, 5.12], 14);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  map.on('click', onMapClick);
}

function onMapClick(e) {
  if (locked) return;
  if (editMode === 'waypoint') {
    addWaypoint(e.latlng);
  } else {
    setEndpoint(e.latlng);
  }
  updateRideButton();
}

function waypointIcon(n) {
  return L.divIcon({
    className: '',
    html: `<div style="background:#14171a;color:white;font-weight:700;font-size:13px;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3)">${n}</div>`,
    iconSize: [26,26],
    iconAnchor: [13,13]
  });
}

const endpointIcon = L.divIcon({
  className: '',
  html: `<div style="font-size:26px;line-height:1;">🏁</div>`,
  iconSize: [26,26],
  iconAnchor: [13,24]
});

function addWaypoint(latlng) {
  const marker = L.marker(latlng, { icon: waypointIcon(waypoints.length + 1), draggable: !locked }).addTo(map);
  const wp = { lat: latlng.lat, lng: latlng.lng, marker };
  waypoints.push(wp);
  marker.on('dragend', () => {
    wp.lat = marker.getLatLng().lat;
    wp.lng = marker.getLatLng().lng;
  });
}

function setEndpoint(latlng) {
  if (endpoint) map.removeLayer(endpoint.marker);
  const marker = L.marker(latlng, { icon: endpointIcon, draggable: !locked }).addTo(map);
  endpoint = { lat: latlng.lat, lng: latlng.lng, marker };
  marker.on('dragend', () => {
    endpoint.lat = marker.getLatLng().lat;
    endpoint.lng = marker.getLatLng().lng;
  });
}

function clearAll() {
  if (locked) return;
  waypoints.forEach(w => map.removeLayer(w.marker));
  waypoints = [];
  if (endpoint) { map.removeLayer(endpoint.marker); endpoint = null; }
  updateRideButton();
}

function setEditMode(mode) {
  editMode = mode;
  document.getElementById('modeWaypoint').classList.toggle('active', mode === 'waypoint');
  document.getElementById('modeEndpoint').classList.toggle('active', mode === 'endpoint');
}

function updateRideButton() {
  const btn = document.getElementById('rideBtn');
  btn.disabled = !endpoint;
}

// ---------- Ride lock/unlock ----------
function toggleRide() {
  locked = !locked;
  const rideBtn = document.getElementById('rideBtn');
  const unlockBtn = document.getElementById('unlockBtn');
  const editBar = document.getElementById('editBar');
  const navPanel = document.getElementById('navPanel');

  if (locked) {
    routeSeq = [...waypoints, endpoint].filter(Boolean);
    visitedCount = 0;
    [...waypoints, endpoint].forEach(p => p && p.marker.dragging && p.marker.dragging.disable());
    editBar.style.display = 'none';
    rideBtn.style.display = 'none';
    unlockBtn.style.display = 'block';
    navPanel.style.display = 'flex';
    document.getElementById('finishToast').style.display = 'none';
  } else {
    [...waypoints, endpoint].forEach(p => p && p.marker.dragging && p.marker.dragging.enable());
    editBar.style.display = 'flex';
    rideBtn.style.display = 'block';
    unlockBtn.style.display = 'none';
    navPanel.style.display = 'none';
  }
}

// ---------- Geo math ----------
function toRad(d) { return d * Math.PI / 180; }
function toDeg(r) { return r * 180 / Math.PI; }

function haversineMeters(a, b) {
  const R = 6371000;
  const dLat = toRad(b.lat - a.lat);
  const dLng = toRad(b.lng - a.lng);
  const lat1 = toRad(a.lat), lat2 = toRad(b.lat);
  const h = Math.sin(dLat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLng/2)**2;
  return 2 * R * Math.asin(Math.sqrt(h));
}

function bearingDeg(a, b) {
  const lat1 = toRad(a.lat), lat2 = toRad(b.lat);
  const dLng = toRad(b.lng - a.lng);
  const y = Math.sin(dLng) * Math.cos(lat2);
  const x = Math.cos(lat1)*Math.sin(lat2) - Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLng);
  return (toDeg(Math.atan2(y, x)) + 360) % 360;
}

// ---------- Live position ----------
function onPosition(pos) {
  currentPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };

  if (!meMarker) {
    meMarker = L.circleMarker([currentPos.lat, currentPos.lng], {
      radius: 8, color: '#fff', weight: 3, fillColor: '#2b7de9', fillOpacity: 1
    }).addTo(map);
    meAccuracyCircle = L.circle([currentPos.lat, currentPos.lng], { radius: pos.coords.accuracy, color: '#2b7de9', weight: 1, fillOpacity: 0.08 }).addTo(map);
    map.setView([currentPos.lat, currentPos.lng], 16);
  } else {
    meMarker.setLatLng([currentPos.lat, currentPos.lng]);
    meAccuracyCircle.setLatLng([currentPos.lat, currentPos.lng]);
    meAccuracyCircle.setRadius(pos.coords.accuracy);
  }

  if (locked) updateNav();
}

function onOrientation(e) {
  // Android absolute compass: alpha is rotation around z, 0 = facing north-ish
  // when device held flat. Convert to a 0-360 "which way am I facing" heading.
  if (typeof e.alpha !== 'number') return;
  heading = (360 - e.alpha) % 360;
  if (locked) updateNav();
}

function updateNav() {
  if (!currentPos || heading === null) return;

  // advance through route as points are reached
  while (visitedCount < routeSeq.length && haversineMeters(currentPos, routeSeq[visitedCount]) < ARRIVAL_METERS) {
    visitedCount++;
  }

  if (visitedCount >= routeSeq.length) {
    document.getElementById('finishToast').style.display = 'block';
    document.getElementById('arrowPrimary').style.opacity = 0.15;
    document.getElementById('arrowSecondary').style.opacity = 0.05;
    document.getElementById('navDist').textContent = '--';
    document.getElementById('navNext').textContent = 'route complete';
    return;
  }

  const next1 = routeSeq[visitedCount];
  const next2 = routeSeq[visitedCount + 1];

  const b1 = bearingDeg(currentPos, next1);
  const rel1 = (b1 - heading + 360) % 360;
  document.getElementById('arrowPrimary').style.transform = `rotate(${rel1}deg)`;
  document.getElementById('arrowPrimary').style.opacity = 1;

  const d1 = haversineMeters(currentPos, next1);
  document.getElementById('navDist').textContent = d1 < 1000 ? `${Math.round(d1)} m` : `${(d1/1000).toFixed(1)} km`;
  document.getElementById('navNext').textContent = (visitedCount === routeSeq.length - 1) ? 'to finish' : `to waypoint ${visitedCount + 1}`;

  if (next2) {
    const b2 = bearingDeg(currentPos, next2);
    const rel2 = (b2 - heading + 360) % 360;
    document.getElementById('arrowSecondary').style.transform = `rotate(${rel2}deg)`;
    document.getElementById('arrowSecondary').style.display = 'block';
  } else {
    document.getElementById('arrowSecondary').style.display = 'none';
  }
}

// ---------- Permissions ----------
function requestPermissions() {
  const finish = () => {
    document.getElementById('permOverlay').style.display = 'none';
    startWatching();
  };

  // Android Chrome: DeviceOrientationEvent.requestPermission is not typically needed,
  // but we still request geolocation explicitly and attach the orientation listener.
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission().then(state => {
      if (state === 'granted') attachOrientation();
      finish();
    }).catch(finish);
  } else {
    attachOrientation();
    finish();
  }
}

function attachOrientation() {
  if ('ondeviceorientationabsolute' in window) {
    window.addEventListener('deviceorientationabsolute', onOrientation, true);
  } else {
    window.addEventListener('deviceorientation', onOrientation, true);
  }
}

function startWatching() {
  if (!navigator.geolocation) {
    alert('Geolocation not available in this browser.');
    return;
  }
  watchId = navigator.geolocation.watchPosition(onPosition, err => console.warn('geo error', err), {
    enableHighAccuracy: true,
    maximumAge: 1000,
    timeout: 10000
  });
}

// ---------- Boot ----------
initMap();
</script>
</body>
</html>
